<!DOCTYPE html>
<html>

<head>

    <title>Appointments - AI Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body class="dash-body">

<div class="sidebar">

    <h2>⚡ AI DOCTOR</h2>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/appointments">📅 Appointments</a>

    <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

    <div class="box">

        <h2>📅 Appointment Booking</h2>

        <form method="POST">

            <input type="text"
                   name="patient_name"
                   placeholder="Patient Name"
                   required>

            <input type="text"
                   name="doctor_name"
                   placeholder="Doctor Name"
                   required>

            <input type="date"
                   name="date"
                   required>

            <input type="time"
                   name="time"
                   required>

            <button type="submit">
                Book Appointment
            </button>

        </form>

        {% if message %}

        <div class="answer-box">

            {{ message }}

        </div>

        {% endif %}

        <h3>Appointment History</h3>

        {% for app in appointments %}

        <div class="answer-box">

            <p>
                <b>Patient:</b>
                {{ app[0] }}
            </p>

            <p>
                <b>Doctor:</b>
                {{ app[1] }}
            </p>

            <p>
                <b>Date:</b>
                {{ app[2] }}
            </p>

            <p>
                <b>Time:</b>
                {{ app[3] }}
            </p>

            <small>{{ app[4] }}</small>

        </div>

        {% endfor %}

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
