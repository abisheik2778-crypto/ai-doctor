<!DOCTYPE html>
<html>

<head>

    <title>Register - AI Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body class="auth-body">

<div class="auth-wrapper">

    <div class="auth-brand">

        <h1>🩺 Join AI Doctor</h1>

        <h2>Smart Health Starts Here</h2>

        <p>
            Create your profile and start using
            AI health assistant, report analyzer,
            BMI calculator and appointment system.
        </p>

    </div>

    <div class="auth-box">

        <h2>Create Account</h2>

        <p>
            Register as a patient
        </p>

        <form method="POST">

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

        <p class="error">
            {{ error }}
        </p>

        <p>
            Already have account?
            <a href="/login">
                Login
            </a>
        </p>

        <p>
            <a href="/">
                Back to Home
            </a>
        </p>

    </div>

</div>

</body>
</html>
