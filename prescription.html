<!DOCTYPE html>
<html>

<head>

    <title>Prescription - AI Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body class="dash-body">

<div class="sidebar">

    <h2>⚡ AI DOCTOR</h2>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/prescription">📝 Prescription</a>

    <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

    <div class="box">

        <h2>📝 AI Prescription Generator</h2>

        <form method="POST">

            <input type="text"
                   name="symptom"
                   placeholder="Example: fever, cough, cold"
                   required>

            <button type="submit">

                Generate Health Format

            </button>

        </form>

        {% if output %}

        <div class="answer-box">

            <p>{{ output }}</p>

        </div>

        {% endif %}

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
