<!DOCTYPE html>
<html>

<head>

    <title>Report Analyzer - AI Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body class="dash-body">

<div class="sidebar">

    <h2>⚡ AI DOCTOR</h2>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/report">📄 Report Analyzer</a>

    <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

    <div class="box">

        <h2>📄 Medical Report Upload</h2>

        <form method="POST"
              enctype="multipart/form-data">

            <input type="file"
                   name="report"
                   required>

            <button type="submit">
                Upload & Analyze
            </button>

        </form>

        {% if message %}

        <div class="answer-box">

            {{ message }}

        </div>

        {% endif %}

        <h3>Uploaded Reports</h3>

        {% for report in reports %}

        <div class="answer-box">

            <b>File:</b>

            <p>{{ report[0] }}</p>

            <b>AI Summary:</b>

            <p>{{ report[1] }}</p>

            <small>{{ report[2] }}</small>

        </div>

        {% endfor %}

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
