<!DOCTYPE html>
<html>

<head>

    <title>AI Chat - AI Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body class="dash-body">

<div class="sidebar">

    <h2>⚡ AI DOCTOR</h2>
    

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/ai-chat">💬 AI Chat</a>

    <a href="/report">📄 Report Analyzer</a>

    <a href="/appointments">📅 Appointments</a>

    <a href="/clear-history">
    <button class="clear-btn">
        🗑 Clear Chat
    </button>
</a>

    <a href="/logout">🚪 Logout</a>

</div>

<div class="main">

    <div class="box">

        <h2>🤖 AI Doctor Chat</h2>

        <form method="POST" action="/chat">

            <input type="text"
                   name="message"
                   placeholder="Example: fever and cough"
                   required>

            <button type="submit">
                Analyze Symptoms
            </button>

        </form>

        <button onclick="startVoice()">
            🎤 Speak Symptoms
        </button>

        <p id="voiceText"></p>

        <h3>Chat History</h3>

        {% for chat in chats %}

        <div class="answer-box">

            <b>You:</b>

            <p>{{ chat[0] }}</p>

            <b>AI Doctor:</b>

            <p>{{ chat[1] }}</p>

            <small>{{ chat[2] }}</small>

        </div>

        {% endfor %}

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
